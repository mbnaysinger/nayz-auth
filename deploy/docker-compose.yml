# Deploy de referência para a VPS (Docker Compose + env_file).
#
# Layout esperado no servidor (repos clonados como irmãos deste arquivo):
#   /opt/nayz/
#     docker-compose.yml        (este arquivo, copiado de nayz-auth/deploy/)
#     .env                      (valores de build do FE — NÃO são segredos)
#     env/nayz-auth.env         (chmod 600, fora do git)
#     nayz-auth/                (git clone)
#     nayz-auth-fe/             (git clone)
#
# O Postgres NÃO sobe aqui: usa-se a instância existente da VPS.
# Containers alcançam o host via "host.docker.internal" (extra_hosts abaixo).
# Portas HTTP expostas apenas em 127.0.0.1 — o acesso público é do reverse proxy (TLS).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [nayz-net]
    # sem ports: só os serviços da network acessam

  nayz-auth:
    build: ./nayz-auth
    restart: unless-stopped
    env_file: ./env/nayz-auth.env
    depends_on: [redis]
    networks: [nayz-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8080:8080" # HTTP (login/refresh) — atrás do reverse proxy
      # gRPC 50051 NÃO é publicado: só a network interna alcança

  nayz-auth-fe:
    build:
      context: ./nayz-auth-fe
      args:
        # Valores públicos (vão para o bundle JS) — definidos no .env ao lado deste arquivo
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_NAYZ_AUTH_APP_ID: ${VITE_NAYZ_AUTH_APP_ID}
    restart: unless-stopped
    depends_on: [nayz-auth]
    networks: [nayz-net]
    ports:
      - "127.0.0.1:8091:80"

networks:
  nayz-net:
    driver: bridge

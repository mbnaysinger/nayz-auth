services:
  postgres:
    image: postgres:15-alpine
    container_name: nayz-postgres
    environment:
      POSTGRES_USER: nayz
      POSTGRES_PASSWORD: nayzpassword
      POSTGRES_DB: nayz_auth
    ports:
      - "5432:5432"
    volumes:
      - nayz_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nayz -d nayz_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nayz-redis
    ports:
      - "6379:6379"
    volumes:
      - nayz_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nayz_postgres_data:
  nayz_redis_data:
